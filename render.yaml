services:
  - type: web
    name: barangay-san-isidro
    env: python
    plan: free
    buildCommand: "bash build_files.sh"
    startCommand: "python manage.py migrate --noinput && python manage.py setup_admin && gunicorn config.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_EMAIL
        value: admin@sanisidro.local
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: barangay-san-isidro-db
          property: connectionString

databases:
  - name: barangay-san-isidro-db
    plan: free
