{% if is_paginated %}
<div class="pagination filter-row">
    {% if page_obj.has_previous %}<a href="?page={{ page_obj.previous_page_number }}" class="btn ghost small">Previous</a>{% endif %}
    <span class="page-info">{{ page_obj.number }} / {{ page_obj.paginator.num_pages }}</span>
    {% if page_obj.has_next %}<a href="?page={{ page_obj.next_page_number }}" class="btn ghost small">Next</a>{% endif %}
</div>
{% endif %}
