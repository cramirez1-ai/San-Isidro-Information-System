{% extends "eventcore/base.html" %}

{% block content %}
<section class="page-title">
    <div>
        <p class="eyebrow">Confirm Delete</p>
        <h1>{{ title }}</h1>
        <p>This action cannot be undone. Please confirm before removing this record from Brgy San Isidro.</p>
    </div>
    <a class="btn secondary" href="{{ back_url }}">Back</a>
</section>

<form class="record-form delete-form" method="post">
    {% csrf_token %}
    <div class="delete-summary">
        <span>Record</span>
        <strong>{{ object }}</strong>
    </div>
    <div class="filter-row">
        <button class="btn danger" type="submit">Delete Record</button>
        <a class="btn secondary" href="{{ back_url }}">Cancel</a>
    </div>
</form>
{% endblock %}
